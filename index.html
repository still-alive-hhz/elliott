<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Elliott</title>
    <link rel="stylesheet" href="/assets/styles.css?v=3">
  </head>
  <body>
    <script src="/assets/header.js?v=3"></script>
    <main class="home-shell">
      <div class="home-content">
        <h1>Still Alive</h1>
        <p class="home-essay-link" id="essay-toggle">建站感言</p>
        <div class="home-essay" id="essay-content" hidden>
          <div class="home-essay-text"></div>
        </div>
      </div>
    </main>

    <script src="/assets/photo-data.js?v=3"></script>
    <script>
      (function () {
        var toggle = document.getElementById("essay-toggle");
        var content = document.getElementById("essay-content");
        var textEl = content.querySelector(".home-essay-text");

        fetch("/assets/pages/建站感言.txt")
          .then(function (r) { return r.text(); })
          .then(function (text) {
            var html = text.split("\n").map(function (line) {
              return line ? "<p>" + line + "</p>" : "";
            }).join("");
            textEl.innerHTML = html;
          });

        toggle.addEventListener("click", function () {
          content.hidden = !content.hidden;
        });
      })();
    </script>
  </body>
</html>
